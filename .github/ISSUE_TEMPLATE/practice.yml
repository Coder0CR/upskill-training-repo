name: Practice
description: Practice set + log misses into reinforcement cards
title: "Practice - "
labels: ["cert", "type/practice"]
body:
  - type: dropdown
    id: cert
    attributes:
      label: Certification
      options:
        - Serverless Microcredential
        - DVA-C02
        - SAA-C03
        - TOGAF
    validations:
      required: true
  - type: dropdown
    id: effort
    attributes:
      label: Effort
      options:
        - S (<=45 min)
        - M (45-90 min)
        - L (90-180 min)
    validations:
      required: true
  - type: textarea
    id: result
    attributes:
      label: Result summary
      placeholder: "Score %, weak domains, surprising misses"
    validations: 
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: Take practice set
        - label: Log misses as new Topic/Build cards
        - label: Move misses to Needs Reinforcement
        - label: Add links/screenshots if helpful
